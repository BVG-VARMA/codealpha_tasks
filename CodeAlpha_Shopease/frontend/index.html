<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopEase — Store</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <!-- ── Navbar ─────────────────────────────────────────── -->
    <nav class="navbar" id="navbar"></nav>

    <!-- ── Hero ───────────────────────────────────────────── -->
    <section class="hero">
      <div class="hero-inner">
        <p class="hero-eyebrow">
          Free Shipping · Easy Returns · 10,000+ Products
        </p>
        <h1>Shop with<br /><em>ease</em></h1>
        <p>Everything you need, delivered fast. No fuss, no hassle.</p>
        <div class="search-wrap">
          <input
            id="search-input"
            type="text"
            placeholder="Search products…"
            oninput="handleSearch()"
            onkeydown="if (event.key === 'Enter') handleSearch();"
          />
          <button class="btn btn-primary" onclick="handleSearch()">
            Search
          </button>
        </div>
      </div>
    </section>

    <!-- ── Filter Bar ─────────────────────────────────────── -->
    <div class="filter-bar" id="filter-bar">
      <span class="filter-label">Filter:</span>
      <button
        class="filter-chip active"
        data-cat="all"
        onclick="setCategory('')"
      >
        All
      </button>
      <!-- Category chips injected by products.js -->
    </div>

    <!-- ── Product Grid ───────────────────────────────────── -->
    <div class="container">
      <div class="grid-header">
        <h2>All Products</h2>
        <span class="result-count" id="result-count"></span>
      </div>
      <div class="product-grid" id="product-grid">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- ── Scripts ────────────────────────────────────────── -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/products.js"></script>
  </body>
</html>
