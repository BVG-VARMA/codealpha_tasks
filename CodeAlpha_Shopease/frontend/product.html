<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopEase — Product</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      .gallery-main {
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--cream);
        aspect-ratio: 1;
        margin-bottom: 0.8rem;
      }
      .gallery-main img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
      <div class="breadcrumb">
        <a href="/index.html">Store</a> ›
        <span id="bc-name">Product</span>
      </div>
      <div id="product-detail">
        <div class="spinner"></div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const productId = params.get("id");
      let selectedQty = 1;

      if (!productId) window.location.href = "/index.html";

      document.addEventListener("DOMContentLoaded", async () => {
        renderNavbar();
        await loadProduct();
      });

      async function loadProduct() {
        try {
          const { product: p } = await api.get(`/products/${productId}`);

          document.title = `ShopEase — ${p.name}`;
          document.getElementById("bc-name").textContent = p.name;

          const outOfStock = p.stock === 0;
          const lowStock = !outOfStock && p.stock < 5;
          const stockLabel = outOfStock
            ? "Out of stock"
            : lowStock
              ? `Only ${p.stock} left!`
              : `${p.stock} in stock`;
          const stockClass = outOfStock
            ? "badge-out"
            : lowStock
              ? "badge-low"
              : "badge-in";

          document.getElementById("product-detail").innerHTML = `
            <div class="detail-layout">

              <!-- Left: single image only -->
              <div class="detail-gallery">
                <div class="gallery-main">
                  <img src="${p.image_url}" alt="${p.name}" onerror="this.style.display='none'" />
                </div>
              </div>

              <!-- Right: info -->
              <div class="detail-info">
                <span class="badge badge-cat" style="background:var(--cream);color:#555">${p.category}</span>
                <h1 class="detail-title">${p.name}</h1>

                <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem">
                  <span class="price price-lg">₹${p.price.toFixed(2)}</span>
                  <span class="badge ${stockClass}">${stockLabel}</span>
                </div>

                <p class="detail-desc">${p.description || ""}</p>

                ${
                  !outOfStock
                    ? `
                  <div class="qty-row">
                    <span class="qty-label">Quantity</span>
                    <div class="qty-wrap">
                      <button class="qty-btn" onclick="changeQty(-1)">−</button>
                      <span class="qty-val" id="qty-display">1</span>
                      <button class="qty-btn" onclick="changeQty(1)">+</button>
                    </div>
                  </div>`
                    : ""
                }

                <button class="detail-add-btn" id="add-btn"
                  ${outOfStock ? "disabled" : ""}
                  onclick="addToCart(${p.id})">
                  ${outOfStock ? "Out of Stock" : "🛒  Add to Cart"}
                </button>

                <a href="/cart.html">
                  <button class="btn btn-outline" style="width:100%">View Cart →</button>
                </a>

                <div class="meta-table">
                  <div class="meta-row"><strong>Category:</strong> ${p.category}</div>
                  <div class="meta-row"><strong>Stock:</strong> ${stockLabel}</div>
                </div>
              </div>

            </div>`;

          window._maxStock = p.stock;
        } catch (err) {
          document.getElementById("product-detail").innerHTML = `
            <div class="empty-state" style="padding-top:4rem">
              <span class="empty-icon">😕</span>
              <h3>Product not found</h3>
              <a href="/index.html" class="btn btn-primary" style="margin-top:1rem">Back to Store</a>
            </div>`;
        }
      }

      function changeQty(delta) {
        selectedQty = Math.min(
          Math.max(1, selectedQty + delta),
          window._maxStock || 99,
        );
        const el = document.getElementById("qty-display");
        if (el) el.textContent = selectedQty;
      }

      async function addToCart(productId) {
        if (!auth.isLoggedIn()) {
          showToast("Please log in to add items to your cart.", "error");
          setTimeout(
            () =>
              (window.location.href = `/login.html?redirect=product.html?id=${productId}`),
            1200,
          );
          return;
        }
        const btn = document.getElementById("add-btn");
        btn.disabled = true;
        btn.textContent = "Adding…";
        try {
          const { items } = await api.post("/cart", {
            productId,
            quantity: selectedQty,
          });
          updateCartBadge(items.reduce((s, i) => s + i.quantity, 0));
          showToast("Added to cart! 🛒", "success");
        } catch (err) {
          showToast(err.message, "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "🛒  Add to Cart";
        }
      }
    </script>
  </body>
</html>
