<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shōp — Checkout</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <!-- ── Navbar ─────────────────────────────────────────── -->
    <nav class="navbar" id="navbar"></nav>

    <!-- ── Page Header ────────────────────────────────────── -->
    <div class="page-header">
      <div class="container">
        <h1>Checkout</h1>
        <p>Almost there!</p>
      </div>
    </div>

    <div class="container">
      <!-- Success box (hidden until order placed) -->
      <div class="success-box" id="success-box">
        <div class="success-icon">🎉</div>
        <h2>Order Confirmed!</h2>
        <p>
          Your order <strong id="success-order-id"></strong> has been placed.<br />
          Total charged: <strong id="success-total"></strong>
        </p>
        <div class="success-actions">
          <a href="/orders.html" class="btn btn-primary">View My Orders</a>
          <a href="/index.html" class="btn btn-outline">Continue Shopping</a>
        </div>
      </div>

      <!-- Checkout form -->
      <div id="checkout-form">
        <div class="checkout-layout">
          <!-- Left: forms -->
          <div>
            <!-- Shipping -->
            <div class="form-card">
              <div class="section-title">📦 Shipping Information</div>
              <div class="form-row">
                <div class="form-group">
                  <label>First Name</label>
                  <input id="fname" type="text" placeholder="Jane" />
                </div>
                <div class="form-group">
                  <label>Last Name</label>
                  <input id="lname" type="text" placeholder="Doe" />
                </div>
              </div>
              <div class="form-group">
                <label>Email</label>
                <input
                  id="email"
                  type="email"
                  readonly
                  style="background: #f9f9f9"
                />
              </div>
              <div class="form-group">
                <label>Street Address</label>
                <input id="address" type="text" placeholder="123 Main St" />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>City</label>
                  <input id="city" type="text" placeholder="New York" />
                </div>
                <div class="form-group">
                  <label>Postal Code</label>
                  <input id="postal" type="text" placeholder="10001" />
                </div>
              </div>
            </div>

            <!-- Payment (UI only — demo) -->
            <div class="form-card">
              <div class="section-title">💳 Payment Details</div>
              <div class="form-group">
                <label>Card Number</label>
                <input
                  type="text"
                  placeholder="4242 4242 4242 4242"
                  maxlength="19"
                  oninput="
                    this.value = this.value
                      .replace(/[^0-9]/g, '')
                      .replace(/(.{4})/g, '$1 ')
                      .trim()
                  "
                />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Expiry</label>
                  <input type="text" placeholder="MM / YY" maxlength="7" />
                </div>
                <div class="form-group">
                  <label>CVV</label>
                  <input type="text" placeholder="123" maxlength="3" />
                </div>
              </div>
              <p
                style="
                  font-size: 0.75rem;
                  color: var(--gray);
                  margin-top: 0.4rem;
                "
              >
                🔒 Demo only — no real payment is processed.
              </p>
            </div>
          </div>

          <!-- Right: order preview -->
          <div class="summary-card">
            <div class="summary-title">Your Order</div>
            <div id="order-items">
              <div
                class="spinner"
                style="
                  width: 24px;
                  height: 24px;
                  border-width: 2px;
                  margin: 1rem auto;
                "
              ></div>
            </div>
            <div class="summary-row summary-total" style="margin-top: 0.8rem">
              <span>Total</span>
              <span id="order-total">—</span>
            </div>
            <button class="place-btn" id="place-btn" onclick="submitOrder()">
              Place Order →
            </button>
            <p
              style="
                font-size: 0.72rem;
                color: #666;
                margin-top: 0.8rem;
                text-align: center;
              "
            >
              By placing your order you agree to our Terms of Service.
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Scripts ────────────────────────────────────────── -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/checkout.js"></script>
  </body>
</html>
