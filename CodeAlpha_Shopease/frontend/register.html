<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopEase — Register</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="auth-page">
    <nav class="navbar" id="navbar"></nav>

    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-logo">Shop<span>Ease</span></div>
        <p class="auth-sub">Shop smarter. Live easier.</p>
        <h2 class="auth-title">Create account</h2>

        <div class="perks">
          <span class="perk">✓ Free shipping</span>
          <span class="perk">✓ Order history</span>
          <span class="perk">✓ Easy returns</span>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input
              id="name"
              type="text"
              placeholder="Jane Doe"
              autocomplete="name"
              required
            />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              id="password"
              type="password"
              placeholder="Min. 6 characters"
              autocomplete="new-password"
              oninput="checkStrength(this.value)"
              required
            />
            <div class="strength-bar" id="strength-bar"></div>
          </div>
          <button
            class="auth-btn auth-btn-accent"
            id="submit-btn"
            type="submit"
          >
            Create Account
          </button>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="/login.html">Sign in</a>
        </div>
      </div>
    </div>

    <!-- ── Scripts ────────────────────────────────────────── -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
      if (auth.isLoggedIn()) window.location.href = "/index.html";

      document.addEventListener("DOMContentLoaded", renderNavbar);

      function checkStrength(val) {
        const bar = document.getElementById("strength-bar");
        if (!val) {
          bar.className = "strength-bar";
          return;
        }
        if (val.length < 6) {
          bar.className = "strength-bar weak";
          return;
        }
        const strong =
          val.length >= 8 && /[A-Z]/.test(val) && /[0-9]/.test(val);
        bar.className = "strength-bar " + (strong ? "strong" : "medium");
      }
    </script>
  </body>
</html>
