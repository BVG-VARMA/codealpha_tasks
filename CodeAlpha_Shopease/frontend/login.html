<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopEase — Login</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="auth-page">
    <nav class="navbar" id="navbar"></nav>

    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-logo">Shop<span>Ease</span></div>
        <p class="auth-sub">Shop smarter. Live easier.</p>
        <h2 class="auth-title">Welcome back</h2>

        <div class="error-msg" id="error-msg"></div>

        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>
          <button class="auth-btn" id="submit-btn" type="submit">
            Sign In
          </button>
        </form>

        <!-- Demo shortcut -->
        <div style="margin-top: 1rem; text-align: center">
          <button
            class="auth-btn"
            style="
              background: var(--cream);
              color: #444;
              font-size: 0.82rem;
              padding: 0.6rem;
            "
            onclick="
              document.getElementById('email').value = 'demo@shop.com';
              document.getElementById('password').value = 'demo1234';
            "
          >
            Use demo account
          </button>
        </div>

        <div class="auth-footer">
          Don't have an account? <a href="/register.html">Create one</a>
        </div>
      </div>
    </div>

    <!-- ── Scripts ────────────────────────────────────────── -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
      // Already logged in → redirect
      if (auth.isLoggedIn()) auth.redirectAfterLogin();

      document.addEventListener("DOMContentLoaded", renderNavbar);
    </script>
  </body>
</html>
