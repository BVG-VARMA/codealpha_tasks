<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shōp — Cart</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <!-- ── Navbar ─────────────────────────────────────────── -->
    <nav class="navbar" id="navbar"></nav>

    <!-- ── Page Header ────────────────────────────────────── -->
    <div class="page-header">
      <div class="container">
        <h1 id="cart-heading">Shopping Cart</h1>
        <p>Review your items before checkout</p>
      </div>
    </div>

    <!-- ── Cart Layout ────────────────────────────────────── -->
    <div class="container">
      <div class="cart-layout">
        <!-- Left: cart items -->
        <div id="cart-items">
          <div class="spinner"></div>
        </div>

        <!-- Right: order summary -->
        <div class="summary-card">
          <div class="summary-title">Order Summary</div>
          <div class="summary-row">
            <span>Items</span>
            <span id="sum-count">—</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>Free</span>
          </div>
          <div class="summary-row summary-total">
            <span>Total</span>
            <span id="sum-total">$0.00</span>
          </div>
          <button class="checkout-btn" id="checkout-btn" onclick="goCheckout()">
            Proceed to Checkout →
          </button>
          <p class="summary-note">🔒 Secure checkout</p>
          <a class="clear-link" onclick="clearCart()">Clear cart</a>
        </div>
      </div>
    </div>

    <!-- ── Scripts ────────────────────────────────────────── -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/cart.js"></script>
  </body>
</html>
