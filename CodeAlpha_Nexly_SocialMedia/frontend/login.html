<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign In — Nexly</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">Nexly</div>
        <p class="auth-tagline">Welcome back. Sign in to continue.</p>

        <form id="login-form" autocomplete="off">
          <div class="form-group">
            <label>Email</label>
            <div class="input-group">
              <span class="input-icon">✉️</span>
              <input
                type="email"
                name="email"
                placeholder="you@email.com"
                required
                autocomplete="email"
              />
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-group">
              <span class="input-icon">🔒</span>
              <input
                type="password"
                name="password"
                placeholder="••••••••"
                required
              />
            </div>
          </div>
          <button
            type="submit"
            class="btn btn-primary btn-full"
            style="margin-top: 4px"
          >
            Sign In →
          </button>
        </form>

        <div class="auth-divider">or</div>

        <p class="auth-footer">
          No account yet? <a href="register.html">Join Nexly</a>
        </p>
      </div>
    </div>
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
